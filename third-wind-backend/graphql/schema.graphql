# This is the "Contract" between your Godot game and AWS.
# Customize these according to what needs to be tracked in your game.

type PlayerState {
	playerId: ID!
	posX: Float!
	posY: Float!
	# TODO: Add your custom game variables here (e.g., health: Int!, animationState: String!)
}

type Mutation {
	updatePlayerState(
		playerId: ID!,
		posX: Float!,
		posY: Float!
	): PlayerState
}

type Query {
	getPlayerState(playerId: ID!): PlayerState
}

type Subscription {
	onUpdatePlayerState: PlayerState
		@aws_subscribe(mutations: ["updatePlayerState"])
}